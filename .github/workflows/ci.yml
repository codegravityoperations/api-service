name: Backend CI

# WHEN does this run?
on:
  pull_request:
    branches: [ main ]       # Every PR targeting main → run tests
  push:
    branches: [ main ]       # Every merge to main → run tests + ready for Phase 2

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest   # GitHub's free Linux runner

    steps:
      # 1. Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Java 21 (matches your local setup)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven              # Caches ~/.m2 between runs → faster CI

      # 3. Run tests
      # WHY -Dspring.profiles.active=test:
      #   Activates application-test.properties which points to Testcontainers DB
      # WHY --no-transfer-progress:
      #   Suppresses Maven download noise in CI logs — cleaner output
      - name: Run tests
        run: mvn clean test -U -Dspring.profiles.active=test --no-transfer-progress

      # 4. Upload test report (visible in GitHub Actions UI after run)
      # This runs even if tests FAIL — so you can see what broke
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/
          retention-days: 7

      # 5. Build the JAR (only on push to main, not on PRs)
      # WHY -DskipTests: tests already ran in step 3, no need to run twice
      - name: Build JAR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mvn package -DskipTests --no-transfer-progress

      # 6. Save the JAR as artifact (Phase 2 will use this)
      - name: Upload JAR artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1