# .github/workflows/ci.yml
name: Backend CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -Dspring.profiles.active=test --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/
          retention-days: 7

  # Build and deploy is now handled by AWS CodePipeline
  # To revert to Phase 2 (GitHub Actions deploys):
  #   1. Remove the "if: false" line below
  #   2. Restore the full build-and-deploy job steps
  build-and-deploy:
    name: Build Image & Deploy to ECS
    runs-on: ubuntu-latest
    needs: test
    if: false  # ← PHASE 3: CodePipeline handles this. Change to:
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    #   to switch back to Phase 2
    steps:
      - run: echo "Deployment handled by AWS CodePipeline"