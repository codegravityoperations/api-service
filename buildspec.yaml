# buildspec.yml
# Used by: AWS CodeBuild (Phase 3 — CodePipeline)
# For Phase 2 we replicate these same steps inside GitHub Actions
version: 0.2

env:
  variables:
    AWS_REGION: "us-east-1"
    ECR_REPOSITORY_URI: "493499579914.dkr.ecr.us-east-1.amazonaws.com/itconsultancy_backend"
    ECS_CLUSTER: "codegravity"
    ECS_SERVICE: "backend_cluster-service-z00naxrm"
    TASK_DEFINITION: "backend_cluster"
    CONTAINER_NAME: "backend"

phases:
  install:
    runtime-versions:
      java: corretto21        # AWS CodeBuild's Java 21 runtime
    commands:
      - echo "Installing dependencies..."

  pre_build:
    commands:
      # Login to ECR
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION |
        docker login --username AWS --password-stdin $ECR_REPOSITORY_URI

      # Capture the short git commit SHA — this becomes your image tag
      # CODEBUILD_RESOLVED_SOURCE_VERSION is set automatically by CodeBuild
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo "Image tag will be: $IMAGE_TAG"

  build:
    commands:
      # Build the JAR first
      - echo "Building Spring Boot JAR..."
      - mvn package -DskipTests --no-transfer-progress

      # Build Docker image
      - echo "Building Docker image..."
      - docker build -t $ECR_REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $ECR_REPOSITORY_URI:$IMAGE_TAG $ECR_REPOSITORY_URI:latest

  post_build:
    commands:
      # Push both tags to ECR
      - echo "Pushing image to ECR..."
      - docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
      - docker push $ECR_REPOSITORY_URI:latest

      # Generate imagedefinitions.json — tells ECS which image + container to update
      # Format is exact: [{"name":"CONTAINER_NAME","imageUri":"FULL_IMAGE_URI"}]
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $ECR_REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - echo "Contents of imagedefinitions.json:"
      - cat imagedefinitions.json

      # Update ECS service to trigger rolling deploy
      - echo "Deploying to ECS..."
      - aws ecs update-service
        --cluster $ECS_CLUSTER
        --service $ECS_SERVICE
        --force-new-deployment
        --region $AWS_REGION

artifacts:
  files:
    - imagedefinitions.json   # CodePipeline Deploy stage reads this in Phase 3