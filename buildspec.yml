version: 0.2

env:
  variables:
    AWS_REGION: "us-east-1"
    ECR_REPOSITORY_URI: "493499579914.dkr.ecr.us-east-1.amazonaws.com/itconsultancy_backend"
    ECS_CLUSTER: "codegravity"
    ECS_SERVICE: "backend_cluster-service-z00naxrm"
    TASK_DEFINITION: "backend_cluster"
    CONTAINER_NAME: "backend"

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Build started at $(date)"
      - echo "Commit SHA = $CODEBUILD_RESOLVED_SOURCE_VERSION"

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION |
        docker login --username AWS --password-stdin $ECR_REPOSITORY_URI
      - aws ecr-public get-login-password --region us-east-1 |
        docker login --username AWS --password-stdin public.ecr.aws
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:0:7}"
      - echo "Image will be tagged as $IMAGE_TAG"

  build:
    commands:
      - echo "Building JAR..."
      - mvn package -DskipTests --no-transfer-progress

      - echo "Building Docker image..."
      - docker build -t $ECR_REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $ECR_REPOSITORY_URI:$IMAGE_TAG $ECR_REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
      - docker push $ECR_REPOSITORY_URI:latest

      - FULL_IMAGE="$ECR_REPOSITORY_URI:$IMAGE_TAG"
      - echo -n "[{\"name\":\"$CONTAINER_NAME\",\"imageUri\":\"$FULL_IMAGE\"}]" > imagedefinitions.json

      - echo "imagedefinitions.json contents:"
      - cat imagedefinitions.json

      - python3 -c "import json,sys; data=json.load(open('imagedefinitions.json')); print('Valid JSON:', data)"

      - echo "Build complete at $(date)"

# imagedefinitions.json must be in artifacts
# CodePipeline Deploy stage picks this up from S3 automatically
artifacts:
  files:
    - imagedefinitions.json
  discard-paths: yes