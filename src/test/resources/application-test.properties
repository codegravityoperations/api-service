# This file activates when Spring profile = "test"
# Testcontainers will OVERRIDE spring.datasource.url dynamically at runtime
# But we still need these set to something so Spring doesn't crash before TC starts

spring.datasource.url=jdbc:tc:mysql:8.0:///itconsultancy_test

spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable mail sending in tests (use mock)
spring.mail.host=localhost
spring.mail.port=3025

# JWT secret for tests
app.jwt.secret=test-secret-key-for-ci-pipeline-only-not-real

# Suppress noisy logging in CI
logging.level.root=WARN
logging.level.com.codegravity.itconsultancy=INFO
logging.level.org.flywaydb=INFO

# Disable swagger in tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false