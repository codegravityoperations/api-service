# This file activates when Spring profile = "test"
# CandidateSearchControllerIT supplies the MySQL Testcontainers datasource dynamically.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable mail sending in tests (use mock)
spring.mail.host=localhost
spring.mail.port=3025

# JWT secret for tests
app.jwt.secret=test-secret-key-for-ci-pipeline-only-not-real

# Suppress noisy logging in CI
logging.level.root=WARN
logging.level.com.codegravity.itconsultancy=INFO
logging.level.org.flywaydb=INFO

# Disable swagger in tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
