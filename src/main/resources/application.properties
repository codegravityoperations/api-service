spring.application.name=it-consultancy-service
spring.profiles.default=dev

# --- Shared JPA/Hikari Defaults ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=ItConsultancyPool
spring.datasource.hikari.connection-timeout=30000
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Flyway Global ---
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- JWT Global ---
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000
app.jwt.token-prefix=Bearer
app.jwt.header-name=Authorization

# --- Mail Global ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# --- Logging Source of Truth ---
logging.config=classpath:logback-spring.xml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# CORS - Development
cors.allowed-origins[0]=http://localhost:3000
cors.allowed-origins[1]=http://localhost:5173
